<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); flex: 1; }
  .upload-area { display: flex; align-items: center; gap: 10px; }
  .upload-btn { background: var(--accent); color: #0d1117; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .upload-btn:hover { opacity: .85; }
  #file-label { color: var(--muted); font-size: 12px; }
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-group label { color: var(--muted); font-size: 12px; }
  select, input[type=date] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .kpi-row { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; flex: 1; min-width: 150px; }
  .kpi .val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .kpi .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .charts { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .chart-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .chart-wrap { position: relative; height: 320px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .legend-item:hover { background: var(--border); color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--bg); color: var(--muted); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  td { padding: 7px 12px; border-bottom: 1px solid #21262d; color: var(--text); }
  tr:hover td { background: #1c2128; }
  .bar-cell { display: flex; align-items: center; gap: 8px; }
  .mini-bar { height: 6px; border-radius: 3px; min-width: 4px; }
  .event-band { background: rgba(88,166,255,.08); border-left: 3px solid var(--accent); padding: 6px 10px; font-size: 12px; color: var(--muted); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
  #loading { position: fixed; inset: 0; background: rgba(13,17,23,.9); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--accent); z-index: 999; }
  .toggle-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .cat-toggle { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; transition: all .15s; }
  .cat-toggle.active { color: #0d1117; font-weight: 600; border-color: transparent; }
</style>
</head>

<div id="loading">Loading dashboard…</div>

<header>

<div class="controls">

  </div>
</div>

<div class="kpi-row" id="kpi-row"></div>

<div class="charts">

    <h3 id="chart-title">Daily Revenue by Category</h3>

    </div>
  </div>
  <div class="chart-card">
    <h3>Category Breakdown Table</h3>
    <div class="table-wrap" id="table-wrap"></div>
  </div>
</div>

const MILESTONES = {
  '2026-04-23': '🚀 I Build / S2 Launch + Espresso GAP + Blk Pudding IAP',
  '2026-04-30': '🎁 Lotus Skin launch',
  '2026-05-01': '⚠️ RPU spike (pre-patch buy-in)',
  '2026-05-07': '🚀 J Build: Blk Pudding + Licorice Cookie + Balance Patch + Webshop GAP',
  '2026-05-12': '🎁 Blueberry Costume Set IAP',
  '2026-05-14': '🎁 School Showdown Gacha + SoulChip IAP + Jeju1 build'
};

const COLORS = {
  'Season Pass':        '#7F77DD',
  'RC Mid':             '#1D9E75',
  'RC Large':           '#D85A30',
  'Cookie Pack':        '#EF9F27',
  'Achievement':        '#378ADD',
  'Summon':             '#E056C0',
  'Crystal':            '#63B3ED',
  'Keep Pack':          '#48BB78',
  'Coin Pack':          '#F6AD55',
  'Costume/Skin':       '#FC8181',
  'RC Other':           '#9F7AEA',
  'Welcome/Attendance': '#68D391',
  'Other':              '#A0AEC0'
};

let DATA = EMBEDDED;
let mainChart = null, pieChart = null, trendChart = null;
let hiddenCats = new Set();

function allCategories() {
  return Object.keys(COLORS).filter(c => DATA.categories.includes(c));
}

function filteredData() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  return DATA.daily_cat.filter(r => (!from || r.date >= from) && (!to || r.date <= to));
}

function groupByDate(rows, metric) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.date]) map[r.date] = {};
    map[r.date][r.category] = (map[r.date][r.category] || 0) + r[metric];
  });
  return map;
}

function render() {
  const metric  = document.getElementById('metric-select').value;
  const ctype   = document.getElementById('chart-type').value;
  const rows    = filteredData();
  const cats    = allCategories().filter(c => !hiddenCats.has(c));
  const byDate  = groupByDate(rows, metric);
  const labels  = Object.keys(byDate).sort();

  // KPIs
  const totalRev  = rows.reduce((s,r) => s + r.revenue, 0);
  const totalTxns = rows.reduce((s,r) => s + r.txns, 0);
  const totalUsers= rows.reduce((s,r) => s + r.users, 0);
  const peakDate  = labels.reduce((best,d) => {
    const v = cats.reduce((s,c) => s+(byDate[d][c]||0), 0);
    return v > best.v ? {d, v} : best;
  }, {d:'', v:0});
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><div class="val">$${totalRev.toLocaleString('en',{maximumFractionDigits:0})}</div><div class="lbl">Total Revenue</div></div>
    <div class="kpi"><div class="val">${totalTxns.toLocaleString()}</div><div class="lbl">Transactions</div></div>
    <div class="kpi"><div class="val">${totalUsers.toLocaleString()}</div><div class="lbl">Paying Users</div></div>
    <div class="kpi"><div class="val">${peakDate.d||'—'}</div><div class="lbl">Peak Day · $${peakDate.v.toLocaleString('en',{maximumFractionDigits:0})}</div></div>
    <div class="kpi"><div class="val">$${totalTxns ? (totalRev/totalTxns).toFixed(2) : '—'}</div><div class="lbl">Avg Ticket</div></div>
  `;

  const metricLabel = {revenue:'Revenue ($)', txns:'Transactions', users:'Unique Users'}[metric];
  document.getElementById('chart-title').textContent = `Daily ${metricLabel} by Category`;

  // Milestone annotations via plugin-free approach: custom background color
  const milestoneIdxs = {};
  labels.forEach((d,i) => { if(MILESTONES[d]) milestoneIdxs[i] = MILESTONES[d]; });

  const datasets = cats.map(cat => ({
    label: cat,
    data: labels.map(d => +(byDate[d]?.[cat] || 0).toFixed(2)),
    backgroundColor: COLORS[cat] + (ctype==='line'?'88':'cc'),
    borderColor: COLORS[cat],
    borderWidth: ctype==='line' ? 1.5 : 0,
    fill: ctype==='line',
    stack: 'stack',
    tension: 0.3,
    pointRadius: 0
  }));

  if (mainChart) mainChart.destroy();
  mainChart = new Chart(document.getElementById('main-chart'), {
    type: ctype==='line' ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#7d8590',
          callbacks: {
            beforeTitle: (items) => {
              const d = items[0]?.label;
              return MILESTONES[d] ? MILESTONES[d] : undefined;
            },
            label: ctx => ` ${ctx.dataset.label}: ${metric==='revenue' ? '$' : ''}${ctx.parsed.y.toLocaleString('en',{maximumFractionDigits:0})}`,
            footer: (items) => {
              const total = items.reduce((s,i) => s+i.parsed.y, 0);
              return `Total: ${metric==='revenue' ? '$' : ''}${total.toLocaleString('en',{maximumFractionDigits:0})}`;
            }
          }
        }
      },
      scales: {
        x: { stacked:true, grid:{color:'#21262d'}, ticks:{color:'#7d8590', maxRotation:45, font:{size:10}} },
        y: { stacked:true, grid:{color:'#21262d'}, ticks:{color:'#7d8590', callback: v => metric==='revenue' ? '$'+v.toLocaleString() : v.toLocaleString() } }
      }
    }
  });

  // Legend
  document.getElementById('chart-legend').innerHTML = allCategories().map(c =>
    `<div class="legend-item ${hiddenCats.has(c)?'':'active'}" onclick="toggleCat('${c}')" style="border:1px solid ${COLORS[c]}33">
      <div class="legend-dot" style="background:${COLORS[c]}"></div>${c}
    </div>`
  ).join('');

  // Pie
  const catTotals = {};
  rows.forEach(r => catTotals[r.category] = (catTotals[r.category]||0) + r[metric]);
  const pieLabels = Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a]);
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pie-chart'), {
    type: 'doughnut',
    data: {
      labels: pieLabels,
      datasets:[{ data: pieLabels.map(c=>+catTotals[c].toFixed(2)), backgroundColor: pieLabels.map(c=>COLORS[c]||'#666'), borderWidth:0 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'55%',
      plugins: {
        legend:{ display:false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          callbacks: { label: ctx => ` ${ctx.label}: ${metric==='revenue'?'$':''}${ctx.parsed.toLocaleString('en',{maximumFractionDigits:0})} (${(ctx.parsed/Object.values(catTotals).reduce((a,b)=>a+b,0)*100).toFixed(1)}%)` }
        }
      }
    }
  });

  // Trend (7-day rolling avg of top 5 cats)
  const top5 = pieLabels.slice(0,5);
  const trendDatasets = top5.map(cat => {
    const daily = labels.map(d => byDate[d]?.[cat] || 0);
    const rolling = daily.map((_,i) => {
      const window = daily.slice(Math.max(0,i-6), i+1);
      return +(window.reduce((s,v)=>s+v,0)/window.length).toFixed(2);
    });
    return { label:cat, data:rolling, borderColor:COLORS[cat], backgroundColor:'transparent', borderWidth:2, tension:0.4, pointRadius:0 };
  });
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trend-chart'), {
    type:'line',
    data:{ labels, datasets:trendDatasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ display:false }, tooltip:{ backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1 } },
      scales:{
        x:{ grid:{color:'#21262d'}, ticks:{color:'#7d8590', maxRotation:45, font:{size:10}} },
        y:{ grid:{color:'#21262d'}, ticks:{color:'#7d8590', callback: v => metric==='revenue'?'$'+v.toLocaleString():v.toLocaleString()} }
      }
    }
  });

  // Table
  const totalAll = Object.values(catTotals).reduce((s,v)=>s+v,0);
  const sorted = Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a]);
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr><th>Category</th><th>${metricLabel}</th><th>Share %</th><th>Transactions</th><th>Avg Ticket</th></tr></thead>
      <tbody>
      ${sorted.map(cat => {
        const rev = rows.filter(r=>r.category===cat).reduce((s,r)=>s+r.revenue,0);
        const txn = rows.filter(r=>r.category===cat).reduce((s,r)=>s+r.txns,0);
        const pct = (catTotals[cat]/totalAll*100).toFixed(1);
        const barW = Math.max(4, catTotals[cat]/catTotals[sorted[0]]*120);
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:7px"><div style="width:8px;height:8px;border-radius:2px;background:${COLORS[cat]||'#666'}"></div>${cat}</div></td>
          <td><div class="bar-cell"><div class="mini-bar" style="width:${barW}px;background:${COLORS[cat]||'#666'}55"></div>${metric==='revenue'?'$':''}${catTotals[cat].toLocaleString('en',{maximumFractionDigits:0})}</div></td>
          <td>${pct}%</td>
          <td>${txn.toLocaleString()}</td>
          <td>$${txn?((rev/txn).toFixed(2)):'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

function toggleCat(cat) {
  if (hiddenCats.has(cat)) hiddenCats.delete(cat);
  else hiddenCats.add(cat);
  render();
}

function buildCatToggles() {
  const el = document.getElementById('cat-toggles');
  el.innerHTML = allCategories().map(c =>
    `<button class="cat-toggle active" style="background:${COLORS[c]}22;border-color:${COLORS[c]}66;color:${COLORS[c]}" onclick="toggleCat('${c}');this.classList.toggle('active');this.style.background=hiddenCats.has('${c}')?'transparent':'${COLORS[c]}22'">${c}</button>`
  ).join('');
}

function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').textContent = 'Processing Excel…';
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws);
      processExcel(json);
      document.getElementById('file-label').textContent = 'Current: ' + file.name;
    } catch(err) {
      alert('Error parsing Excel: ' + err.message);
    }
    document.getElementById('loading').style.display = 'none';
  };
  reader.readAsBinaryString(file);
}

function categorize(pid) {
  const p = String(pid).toLowerCase();
  if (p.includes('seasonpass')) return 'Season Pass';
  if (p.includes('rainbowcredit') && (p.includes('tier29')||p.includes('tier22_')||p.includes('tier4_'))) return 'RC Large';
  if (p.includes('rainbowcredit') && (p.includes('tier15')||p.includes('tier10')||p.includes('tier5'))) return 'RC Mid';
  if (p.includes('rainbowcredit')) return 'RC Other';
  if (p.includes('crystal')) return 'Crystal';
  if (p.includes('summon')) return 'Summon';
  if (p.includes('cookie') || p.includes('cookiepass')) return 'Cookie Pack';
  if (p.includes('ovencrown')||p.includes('mastery')||p.includes('ovenlevel')) return 'Achievement';
  if (p.includes('keep')) return 'Keep Pack';
  if (p.includes('coin')) return 'Coin Pack';
  if (p.includes('istanbul')||p.includes('costume')||p.includes('skin')||p.includes('soulchip')) return 'Costume/Skin';
  if (p.includes('welcome')||p.includes('attendance')) return 'Welcome/Attendance';
  return 'Other';
}

function processExcel(json) {
  const daily_cat = {}, daily_prod = {};
  const cats = new Set();
  json.forEach(row => {
    const pid = row['product_id'] || row['product id'] || '';
    const val = parseFloat(row['recharged_value'] || row['revenue'] || row['amount'] || 0);
    const uid = row['user_id'] || row['user id'] || '';
    let dateRaw = row['ds'] || row['date'] || '';
    if (typeof dateRaw === 'number') {
      dateRaw = new Date((dateRaw-25569)*86400000).toISOString().split('T')[0];
    } else {
      dateRaw = String(dateRaw).split('T')[0].split(' ')[0];
    }
    const cat = categorize(pid);
    cats.add(cat);
    const key = dateRaw + '|' + cat;
    if (!daily_cat[key]) daily_cat[key] = {date:dateRaw, category:cat, revenue:0, txns:0, users:new Set()};
    daily_cat[key].revenue += val;
    daily_cat[key].txns++;
    daily_cat[key].users.add(uid);
  });
  DATA = {
    daily_cat: Object.values(daily_cat).map(r=>({...r, users:r.users.size})),
    daily_prod: [],
    categories: [...cats]
  };
  initDatePickers();
  buildCatToggles();
  render();
}

function initDatePickers() {
  const dates = [...new Set(DATA.daily_cat.map(r=>r.date))].sort();
  document.getElementById('date-from').value = dates[0] || '';
  document.getElementById('date-to').value = dates[dates.length-1] || '';
}

// Init
window.onload = () => {
  document.getElementById('loading').style.display = 'none';
  initDatePickers();
  buildCatToggles();
  render();
};
</script>
